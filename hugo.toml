baseURL = "https://myblog.vercel.app/"
languageCode = "zh-cn"
title = "鱼肉的Blog"
theme = "PaperMod"
hasCJKLanguage = true

[outputs]
    home = ["HTML", "RSS", "JSON"]

[params]
    defaultTheme = "auto"
    ShowReadingTime = true
    ShowShareButtons = true
    ShowWordCount = true
    DateFormat = "2006年1月2日"
    author = "鱼肉"

    # 首页个人资料卡片
    [params.profileInfo]
        name = "鱼肉"
        subtitle = ""
        avatarUrl = "/images/avatar.png"

    # 社交媒体图标（name 必须与 PaperMod 内置图标名匹配）
    [[params.socialIcons]]
        name = "github"
        url = "https://github.com/Kie70"
        title = "GitHub"
    [[params.socialIcons]]
        name = "wechat"
        url = "#"
        title = "微信号: ugniop"
    [[params.socialIcons]]
        name = "email"
        url = "mailto:boyu.zhu25@outlook.com"
        title = "邮箱"
    [[params.socialIcons]]
        name = "tiktok"
        url = "https://v.douyin.com/b2ahSeLSz_w/"
        title = "抖音"

    [params.fuseOpts]
        threshold = 0.3
        ignoreLocation = true
        distance = 100
        limit = 10
        keys = ["title", "summary", "content"]
        minMatchCharLength = 2
        findAllMatches = false

[menu]
    [[menu.main]]
        identifier = "archives"
        name = "文章"
        url = "/archives/"
        weight = 5
    [[menu.main]]
        identifier = "about"
        name = "关于"
        url = "/about/"
        weight = 8
    [[menu.main]]
        identifier = "search"
        name = "搜索"
        url = "/search/"
        weight = 10

[markup]
    [markup.goldmark]
        [markup.goldmark.renderer]
            unsafe = true
